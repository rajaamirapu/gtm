<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GTM Strategy Quiz</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        padding: 20px;
    }
    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; }
    .timer {
        text-align: center;
        font-size: 20px;
        color: red;
        margin-bottom: 20px;
    }
    .question {
        margin-bottom: 20px;
    }
    .option {
        display: block;
        margin: 8px 0;
        padding: 10px;
        background: #e9ecef;
        border-radius: 5px;
        cursor: pointer;
    }
    .option:hover { background: #d6d8db; }
    .correct { background: #28a745 !important; color: white; }
    .wrong { background: #dc3545 !important; color: white; }
    .next-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .score {
        text-align: center;
        font-size: 22px;
    }
</style>
</head>

<body>
<div class="container">
    <h2>Confusing GTM Strategy Quiz 🤯</h2>
    <div class="timer" id="timer">60:00</div>

    <div id="quiz"></div>
    <button class="next-btn" onclick="nextQuestion()">Next</button>

    <div class="score" id="score"></div>
</div>

<script>
const questions = [
{
    q: "Which statement BEST represents 'value' in marketing?",
    options: [
        "Price of the product",
        "Perceived benefit minus perceived cost",
        "Customer satisfaction only",
        "Brand awareness"
    ],
    answer: 1
},
{
    q: "A company choosing NOT to compete in a segment means:",
    options: [
        "They have no competitors",
        "They avoided substitutes",
        "They chose their competition strategically",
        "They lack capability"
    ],
    answer: 2
},
{
    q: "Which of the following is NOT a role in buying behavior?",
    options: [
        "Gatekeeper",
        "Influencer",
        "Compiler",
        "Decision maker"
    ],
    answer: 2
},
{
    q: "Why do customers stop taking medicine before full course?",
    options: [
        "Lack of availability",
        "Attribution theory & lack of feedback",
        "High pricing",
        "Poor branding"
    ],
    answer: 1
},
{
    q: "Which is the MOST confusing truth about competition?",
    options: [
        "Competition is always direct",
        "Competition is chosen by the seller",
        "Competition doesn’t exist",
        "Competition only reduces profit"
    ],
    answer: 1
},
{
    q: "What is the core challenge in GTM strategy?",
    options: [
        "Choosing colors for product",
        "Selecting office location",
        "Choosing target segment & value proposition",
        "Hiring employees"
    ],
    answer: 2
},
{
    q: "Why is over-promising dangerous?",
    options: [
        "It increases sales too fast",
        "Customers blame themselves for failure",
        "Customers blame the company for failure",
        "It reduces marketing cost"
    ],
    answer: 2
},
{
    q: "Need vs Want confusion: Which is correct?",
    options: [
        "Need = Product, Want = Brand always",
        "Need is fixed, Want varies based on context",
        "Want is always unnecessary",
        "Need and Want are same"
    ],
    answer: 1
},
{
    q: "Why is 'brand' powerful?",
    options: [
        "It reduces production cost",
        "It replaces product",
        "It adds emotional and functional value",
        "It removes competition"
    ],
    answer: 2
},
{
    q: "What is the biggest GTM mistake?",
    options: [
        "Not advertising",
        "Ignoring customer behavior stages",
        "Low pricing",
        "Using technology"
    ],
    answer: 1
}
];

let current = 0;
let score = 0;

function loadQuestion() {
    if (current >= questions.length) {
        document.getElementById("quiz").innerHTML = "";
        document.getElementById("score").innerHTML =
            "Final Score: " + score + "/" + questions.length;
        return;
    }

    let q = questions[current];
    let html = "<div class='question'><h3>" + (current+1) + ". " + q.q + "</h3>";

    q.options.forEach((opt, i) => {
        html += `<div class="option" onclick="checkAnswer(${i}, this)">
                    ${opt}
                 </div>`;
    });

    html += "</div>";
    document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(selected, element) {
    let correct = questions[current].answer;
    let options = document.querySelectorAll(".option");

    options.forEach((opt, i) => {
        if (i === correct) opt.classList.add("correct");
        if (i === selected && i !== correct) opt.classList.add("wrong");
    });

    if (selected === correct) score++;
    else {
        alert("Wrong! Correct answer is: " +
            questions[current].options[correct]);
    }
}

function nextQuestion() {
    current++;
    loadQuestion();
}

// TIMER (1 hour)
let time = 60 * 60;
const timerElement = document.getElementById("timer");

const countdown = setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    timerElement.innerHTML =
        `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

    time--;

    if (time < 0) {
        clearInterval(countdown);
        alert("Time's up!");
        document.getElementById("quiz").innerHTML = "";
    }
}, 1000);

loadQuestion();
</script>
</body>
</html>
